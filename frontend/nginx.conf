server {
    listen 80;
    server_tokens off;  # Hide nginx version

    root  /usr/share/nginx/html;
    index index.html;

    # ── Security Headers ──────────────────────────────────
    add_header X-Frame-Options           "SAMEORIGIN"            always;
    add_header X-Content-Type-Options    "nosniff"               always;
    add_header X-XSS-Protection          "1; mode=block"         always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy        "geolocation=(), microphone=()" always;
    add_header Content-Security-Policy   "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:;" always;

    # ── Gzip Compression ──────────────────────────────────
    gzip            on;
    gzip_vary       on;
    gzip_min_length 1024;
    gzip_types      text/plain text/css application/json application/javascript
                    text/xml application/xml text/javascript;

    # ── Static Asset Caching ──────────────────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires     1y;
        add_header  Cache-Control "public, immutable";
        access_log  off;
    }

    # ── API Reverse Proxy → Backend container ─────────────
    location /api/ {
        proxy_pass          http://backend:5000;
        proxy_http_version  1.1;
        proxy_set_header    Host              $host;
        proxy_set_header    X-Real-IP         $remote_addr;
        proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto $scheme;
        proxy_read_timeout  60s;
        proxy_connect_timeout 10s;

        # Prevent large payload abuse
        client_max_body_size 1m;
    }

    # ── React SPA fallback ────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Block hidden files (.env, .git, etc.) ────────────
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
