version: "3.9"

# ─────────────────────────────────────────────────────────────
#  MySQL runs DIRECTLY on the droplet host (not in Docker).
#  Containers reach it via the special host-gateway alias.
#  Set DB_HOST=host.docker.internal in your .env file.
# ─────────────────────────────────────────────────────────────

services:

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    image: stakpak-backend:latest
    container_name: stakpak_backend
    restart: unless-stopped

    # Allow containers to reach host's MySQL
    extra_hosts:
      - "host.docker.internal:host-gateway"

    environment:
      NODE_ENV:    production
      PORT:        5000
      DB_HOST:     ${DB_HOST}
      DB_PORT:     ${DB_PORT}
      DB_USER:     ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME:     ${DB_NAME}

    expose:
      - "5000"

    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

    # Resource limits for a small droplet
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
        reservations:
          memory: 128M

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: production
    image: stakpak-frontend:latest
    container_name: stakpak_frontend
    restart: unless-stopped

    depends_on:
      backend:
        condition: service_healthy

    ports:
      - "80:80"

    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 64M
        reservations:
          memory: 32M

    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "3"

networks:
  default:
    name: stakpak_network
